<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macau 2D Live</title>
    <style>
        body { background-color: #0d0d0d; color: #f1c40f; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0d0d0d 100%); }
        .header { width: 100%; text-align: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .main-result { border: 8px double #f1c40f; border-radius: 50%; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; font-size: 80px; font-weight: bold; margin: 20px 0; box-shadow: 0 0 40px rgba(241, 196, 15, 0.4); background: radial-gradient(circle, #2c2201, #000); text-shadow: 2px 2px 5px #000; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 450px; }
        .card { background: #161616; border: 1px solid #333; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card.active { border: 1.5px solid #f1c40f; background: linear-gradient(145deg, #251e01, #161616); }
        .time { color: #f1c40f; font-size: 14px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .num { font-size: 40px; font-weight: bold; margin: 5px 0; color: #fff; letter-spacing: 2px; }
        .info { display: flex; justify-content: space-between; font-size: 10px; color: #777; border-top: 1px solid #222; padding-top: 8px; margin-top: 8px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; letter-spacing: 3px;">MACAU 2D LIVE</h1>
        <small id="current-time" style="color: #666;"></small>
    </div>

    <div class="main-result" id="live-big-num">--</div>
    <p style="color: #f1c40f; font-size: 13px;">Live Updating...</p>

    <div class="grid">
        <div class="card"><div class="time">08:30 AM</div><div class="num">77</div><div class="info"><span>SET: 1068.17</span><span>VAL: 16985.34</span></div></div>
        <div class="card"><div class="time">10:30 AM</div><div class="num">56</div><div class="info"><span>SET: 1201.34</span><span>VAL: 49791.01</span></div></div>
        <div class="card"><div class="time">12:30 PM</div><div class="num">04</div><div class="info"><span>SET: 1160.40</span><span>VAL: 11683.47</span></div></div>
        <div class="card active"><div class="time">04:30 PM</div><div class="num" id="live-small-num">--</div><div class="info"><span>SET: 1089.22</span><span>VAL: 74581.65</span></div></div>
    </div>

    <script>
        // ဂဏန်းတွေကို ၅ စက္ကန့်တစ်ခါ အလိုအလျောက် ပြောင်းပေးမည့်စနစ်
        function updateLive() {
            let randomNum = Math.floor(Math.random() * 100).toString().padStart(2, '0');
            document.getElementById('live-big-num').innerText = randomNum;
            document.getElementById('live-small-num').innerText = randomNum;
            
            let now = new Date();
            document.getElementById('current-time').innerText = "Last Update: " + now.toLocaleString();
        }

        // စစချင်း တစ်ခါ Update လုပ်ပြီး ၅ စက္ကန့်တိုင်း ဆက်လုပ်မယ်
        updateLive();
        setInterval(updateLive, 5000);
    </script>
</body>
</html>
