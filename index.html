<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macau 2D Live - Professional Edition</title>
    <style>
        :root {
            --gold: #d4af37;
            --light-gold: #f1c40f;
            --bg-dark: #000000;
            --card-bg: rgba(26, 26, 26, 0.95);
        }
        body { 
            background: radial-gradient(circle at top, #4a0000 0%, #000 70%);
            color: var(--gold); font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 10px; min-height: 100vh;
        }
        .top-nav { width: 100%; display: flex; justify-content: space-between; padding: 10px; font-size: 14px; font-weight: bold; }
        
        .main-display {
            text-align: center; margin-top: 10px; position: relative;
        }
        .main-number-circle {
            width: 160px; height: 160px;
            border: 4px solid var(--gold); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #222, #000);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            font-size: 85px; font-weight: 900; color: #fff;
            margin: 10px auto; text-shadow: 0 0 10px var(--gold);
        }
        .update-time { font-size: 11px; color: #aaa; margin-bottom: 20px; }

        .grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 12px; width: 100%; max-width: 450px; 
        }
        .card { 
            background: var(--card-bg); 
            border: 1px solid #444; border-radius: 5px; 
            padding: 10px; text-align: center;
            border-top: 2px solid var(--gold);
        }
        .card.active { 
            background: linear-gradient(to bottom, #d4af37, #1a1a1a);
            border: 2px solid var(--light-gold);
        }
        .card.active .time, .card.active .num { color: #fff; }

        .time { color: var(--gold); font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .num { font-size: 36px; font-weight: bold; color: #fff; margin: 2px 0; }
        
        .details { 
            display: flex; justify-content: space-around; font-size: 9px; 
            color: #888; border-top: 1px solid #333; padding-top: 5px; margin-top: 5px;
        }
        .details b { color: #ccc; }
    </style>
</head>
<body>
    <div class="top-nav">
        <span>MENU</span>
        <span>2D 3D</span>
    </div>

    <div class="main-display">
        <h2 style="margin:0; letter-spacing: 2px;">MACAU 2D LIVE</h2>
        <div class="main-number-circle" id="big-num">--</div>
        <div class="update-time">Updated: <span id="current-date"></span></div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="time">11:00 AM</div>
            <div class="num">77</div>
            <div class="details"><span>SET: <b>1068.17</b></span><span>VALUE: <b>16985.34</b></span></div>
        </div>
        <div class="card">
            <div class="time">01:00 PM</div>
            <div class="num">56</div>
            <div class="details"><span>SET: <b>1201.34</b></span><span>VALUE: <b>49791.01</b></span></div>
        </div>
        <div class="card">
            <div class="time">03:00 PM</div>
            <div class="num">04</div>
            <div class="details"><span>SET: <b>1160.40</b></span><span>VALUE: <b>11683.47</b></span></div>
        </div>
        <div class="card active">
            <div class="time">05:00 PM</div>
            <div class="num" id="live-num">--</div>
            <div class="details"><span>SET: <b>1089.22</b></span><span>VALUE: <b>74581.65</b></span></div>
        </div>
