<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macau 2D Live</title>
    <style>
        /* အရောင်နှင့် နောက်ခံ သတ်မှတ်ချက် */
        body { 
            background: radial-gradient(circle at top, #5e0101 0%, #000 80%); 
            color: #e4c666; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 10px; 
            min-height: 100vh;
        }
        .header { text-align: center; margin-top: 10px; }
        .header h2 { margin: 0; letter-spacing: 3px; color: #e4c666; }
    </style>
</head>
<body>
    <div class="header">
        <h2>MACAU 2D LIVE</h2>
    </div>
<div class="main-ring" id="big-num">--</div>
    <div class="updated-text">Updated: <span id="clock">Loading...</span></div>

    <style>
        .main-ring {
            width: 170px; height: 170px;
            border: 4px solid #e4c666; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #333, #000);
            box-shadow: 0 0 25px rgba(228, 198, 102, 0.4);
            font-size: 85px; font-weight: 900; color: #fff;
            margin: 15px auto; position: relative;
        }
        .main-ring::after {
            content: ''; position: absolute; width: 185px; height: 185px;
            border: 1px solid rgba(228, 198, 102, 0.3); border-radius: 50%;
        }
        .updated-text { font-size: 11px; color: #aaa; margin-bottom: 20px; }
    </style>

    </body>
</html>
