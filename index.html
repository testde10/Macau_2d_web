<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macau 2D Live - Background Only</title>
    <style>
        /* CSS Variables - အရောင်သတ်မှတ်ချက်များ */
        :root {
            --bg-deep-red: #3a0000; /* ဝိုင်နီရင့်ရင့် */
            --bg-black: #000000;    /* အနက် */
            --gold-bright: #f1c40f; /* တောက်ပသော ရွှေရောင် */
            --gold-muted: #d4af37;  /* မှိန်သော ရွှေရောင် */
            --gold-light: rgba(241, 196, 15, 0.2); /* ရွှေရောင်ဖျော့ဖျော့ */
        }

        /* Full Background & Overlay Setup - နောက်ခံနှင့် အလွှာများ */
        body { 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            background-color: var(--bg-black);
            font-family: 'Segoe UI', Arial, sans-serif;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Layer 1: Base Gradient - အနီနှင့် အနက် နောက်ခံ */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--bg-deep-red) 0%, var(--bg-black) 70%);
            z-index: -2; /* အောက်ဆုံးအလွှာ */
        }

        /* Layer 2: Card Suits Pattern Overlay - ဖဲချပ်ပုံစံများ */

            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
