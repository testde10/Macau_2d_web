<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macau 2D Live</title>
    <style>
        body { 
            background: radial-gradient(circle at top, #800000 0%, #2b0000 50%, #000000 100%); 
            color: #e4c666; font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 15px; min-height: 100vh;
        }

        .main-ring {
            width: 160px; height: 160px;
            border: 4px solid #e4c666; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #222, #000);
            box-shadow: 0 0 25px rgba(228, 198, 102, 0.4);
            font-size: 80px; font-weight: 900; color: #fff;
            margin: 20px auto;
        }

        .grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 12px; width: 100%; max-width: 480px; 
        }

        /* အချိန်ပြကွက် ဘောင်ဒီဇိုင်း */
        .card { 
            background: rgba(20, 20, 20, 0.95); 
            border: 1px solid #3d3d3d; 
            border-radius: 8px; 
            padding: 15px; 
            text-align: center; 
            position: relative;
            border-top: 3px solid #e4c666; /* အပေါ်ဘောင် ရွှေရောင် */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* ထောင့်လေးများတွင် ရွှေရောင်လိုင်းထည့်ခြင်း */
        .card::after {
            content: ''; position: absolute; bottom: 5px; right: 5px;
            width: 10px; height: 10px;
            border-right: 2px solid #e4c666; border-bottom: 2px solid #e4c666;
        }
        .card::before {
            content: ''; position: absolute; bottom: 5px; left: 5px;
            width: 10px; height: 10px;
            border-left: 2px solid #e4c666; border-bottom: 2px solid #e4c666;
        }

        .time { color: #e4c666; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .num { font-size: 40px; font-weight: bold; color: #fff; margin: 5px 0; }
        .details { display: flex; justify-content: space-between; font-size: 9px; color: #888; border-top: 1px solid #222; padding-top: 6px; }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 3px; margin-bottom: 5px;">MACAU 2D LIVE</h2>
    
    <div class="main-ring" id="big-num">--</div>
    <p style="font-size: 11px; color: #aaa;">Updated: <span id="clock"></span></p>

    <div class="grid">
        <div class="card"><div class="time">11:00 AM</div><div class="num">77</div>
            <div class="details"><span>SET: 1068.17</span><span>VAL: 16985.34</span></div>
        </div>
        <div class="card"><div class="time">01:00 PM</div><div class="num">56</div>
            <div class="details"><span>SET: 1201.34</span><span>VAL: 49791.01</span></div>
        </div>
        <div class="card"><div class="time">03:00 PM</div><div class="num">04</div>
            <div class="details"><span>SET: 1160.40</span><span>VAL: 11683.47</span></div>
        </div>
        <div class="card" style="border: 2px solid #fff;"><div class="time">05:00 PM</div><div class="num" id="live-num">--</div>
            <div class="details"><span>SET: 1089.22</span><span>VAL: 74581.65</span></div>
        </div>
        <div class="card"><div class="time">07:00 PM</div><div class="num">--</div>
            <div class="details"><span>SET: --</span><span>VAL: --</span></div>
        </div>
        <div class="card"><div class="time">09:00 PM</div><div class="num">--</div>
            <div class="details"><span>SET: --</span><span>VAL: --</span></div>
        </div>
    </div>
<script>
   <script>
    function update() {
        try {
            // ၁။ SET နဲ့ VALUE ကို ကျပန်းဂဏန်းများ ထွက်လာအောင် လုပ်ခြင်း
            let randomSet = (Math.random() * 2000 + 1000).toFixed(2);   
            let randomValue = (Math.random() * 80000 + 10000).toFixed(2); 

            // ၂။ SET ရဲ့ နောက်ဆုံးဂဏန်း (ထိပ်စီး)
            let setMain = randomSet.split('.')[0]; 
            let firstNum = setMain.slice(-1); 

            // ၃။ VALUE ရဲ့ ဒသမရှေ့ဂဏန်း (နောက်ပိတ်)
            let valueMain = randomValue.split('.')[0];
            let lastNum = valueMain.slice(-1);

            // ၄။ ၂လုံးဂဏန်း ပေါင်းစပ်ခြင်း
            let result2D = firstNum + lastNum;

            // ၅။ Website ပေါ်မှာ ပြသခြင်း
            // ဂဏန်းဝိုင်းကြီးနဲ့ Active ဖြစ်နေတဲ့ အကွက်ကို Update လုပ်ခြင်း
            document.getElementById('big-num').innerText = result2D;
            
            let liveNumElem = document.getElementById('live-num');
            if(liveNumElem) {
                liveNumElem.innerText = result2D;
                
                // လက်ရှိ 05:00 PM အကွက်ထဲက SET နဲ့ VALUE ကိုပါ Update လုပ်ခြင်း
                let card = liveNumElem.closest('.card');
                if(card) {
                    let details = card.querySelectorAll('b');
                    if(details.length >= 2) {
                        details[0].innerText = randomSet;
                        details[1].innerText = randomValue;
                    }
                }
            }

            document.getElementById('clock').innerText = new Date().toLocaleString();
        } catch (error) {
            console.log("Update error: ", error);
        }
    }

    // ၇ စက္ကန့်ခြား တစ်ခါ အသစ်လဲလှယ်ခြင်း
    setInterval(update, 7000); 
    update();
</script>
</body>
</html>
