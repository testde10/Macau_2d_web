<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACAU 2D LIVE</title>
    <style>
        body {
            background: radial-gradient(circle, #4b0000 0%, #000 100%);
            color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }
        .coin {
            position: fixed; top: -60px; z-index: -1; pointer-events: none;
            animation: fall linear infinite; background: transparent !important;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .app-header { padding: 20px 10px 5px 10px; width: 100%; text-align: center; }
    body {
    background: radial-gradient(circle, #8b0000 0%, #200000 100%);
    color: #ffffff;
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
}
.app-name {
    font-family: 'Times New Roman', serif;
    font-weight: 900;
    font-size: 42px;
    text-transform: uppercase;
    letter-spacing: 4px;
    position: relative;
    display: inline-block;
    
    /* Set Initial Color */
    color: #ffffff;
    
    /* Background wipe setup */
    background: linear-gradient(to right, #ffd700 0%, #ffd700 50%, #ffffff 50%, #ffffff 100%);
    background-size: 200% 100%;
    background-position: 100% 0;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    
    /* 60s = 1 Minute cycle */
    animation: textReveal 60s ease-in-out infinite;
}

@keyframes textReveal {
    /* Start: Pure White */
    0% { 
        background-position: 100% 0;
        filter: drop-shadow(0 0 0px rgba(255, 255, 255, 0));
    }
    /* Wipe from Left to Right (White to Black to Gold transition) */
    2% { 
        background-position: 0% 0; 
        filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
    }
    /* Final Bright Shine */
    4% { 
        filter: drop-shadow(0 0 20px rgba(255, 215, 0, 1)) brightness(1.5);
    }
    /* Stay Gold & Glow for the rest of the minute */
    6%, 98% { 
        background-position: 0% 0; 
        filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8));
    }
    /* Reset for next minute */
    100% { 
        background-position: 100% 0; 
    }
}
        #main-display {
            width: 190px; height: 190px; background: radial-gradient(circle, #1a1a1a, #000);
            border: 5px solid #d4af37; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.2); margin: 15px auto;
        }
        .main-number { font-size: 100px; font-weight: bold; color: white; text-shadow: 3px 3px 10px #000; }
        .update-bar {
            background: rgba(0, 0, 0, 0.85); padding: 8px 25px; border-radius: 50px;
            border: 1.5px solid #d4af37; font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 25px;
        }
        #grid-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            padding: 0 20px 40px 20px; width: 100%; max-width: 480px; box-sizing: border-box;
        }
        .card { background: #0d0d0d; border: 1.2px solid #d4af37; border-radius: 14px; overflow: hidden; text-align: center; }
        .time-label { background: linear-gradient(to right, #bf953f, #fcf6ba, #d4af37); color: #000 !important; padding: 10px; font-size: 15px; font-weight: 800; }
        .result-num { font-size: 45px; font-weight: 900; padding: 12px 0; color: #fff; }
        .data-row { display: flex; justify-content: space-around; padding: 10px; font-size: 11px; color: #d4af37; border-top: 1px solid #222; background: #050505; }
        .data-row span { display: flex; flex-direction: column; gap: 3px; font-weight: bold; }
        .data-row small { color: #fff; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-header"><div class="app-name">MACAU 2D</div></div>
    <div id="main-display"><div class="main-number" id="main-num">--</div></div>
    <div class="update-bar">Updated: <span id="live-clock">--:--:--</span></div>

    <div id="grid-container">
        <div class="card">
            <div class="time-label">11:00 AM</div>
            <div class="result-num" id="res-1100">--</div>
            <div class="data-row">
                <span>SET<small id="set-1100">--</small></span>
                <span>VALUE<small id="val-1100">--</small></span>
            </div>
        </div>
        <div class="card">
            <div class="time-label">01:00 PM</div>
            <div class="result-num" id="res-1300">--</div>
            <div class="data-row">
                <span>SET<small id="set-1300">--</small></span>
                <span>VALUE<small id="val-1300">--</small></span>
            </div>
        </div>
        <div class="card">
            <div class="time-label">03:00 PM</div>
            <div class="result-num" id="res-1500">--</div>
            <div class="data-row">
                <span>SET<small id="set-1500">--</small></span>
                <span>VALUE<small id="val-1500">--</small></span>
            </div>
        </div>
        <div class="card">
            <div class="time-label">05:00 PM</div>
            <div class="result-num" id="res-1700">--</div>
            <div class="data-row">
                <span>SET<small id="set-1700">--</small></span>
                <span>VALUE<small id="val-1700">--</small></span>
            </div>
        </div>
        <div class="card">
            <div class="time-label">07:00 PM</div>
            <div class="result-num" id="res-1900">--</div>
            <div class="data-row">
                <span>SET<small id="set-1900">--</small></span>
                <span>VALUE<small id="val-1900">--</small></span>
            </div>
        </div>
        <div class="card">
            <div class="time-label">09:00 PM</div>
            <div class="result-num" id="res-2100">--</div>
            <div class="data-row">
                <span>SET<small id="set-2100">--</small></span>
                <span>VALUE<small id="val-2100">--</small></span>
            </div>
        </div>
    </div>
<script>
    function runEngine() {
        const now = new Date();
        const currentSecs = Math.floor(now.getTime() / 1000);
        const hrs = now.getHours();
        const mins = now.getMinutes();
        const secs = now.getSeconds();
        
        const clockEl = document.getElementById('live-clock');
        if (clockEl) clockEl.innerText = now.toLocaleTimeString();

        const savedData = localStorage.getItem('macau_live_v2');
        let currentRandom = savedData ? JSON.parse(savedData) : null;

        // Freeze logic: 
        // 11:00 AM Draw -> Freeze from 10:59:51 to 11:30:00
        // 01:00 PM Draw -> Freeze from 12:59:51 to 13:30:00
       const isFrozen = 
            (hrs === 10 && mins === 59 && secs >= 51)  (hrs === 11 && mins < 30) 
            (hrs === 12 && mins === 59 && secs >= 51)  (hrs === 13 && mins < 30) 
            (hrs === 14 && mins === 59 && secs >= 51)  (hrs === 15 && mins < 30) 
            (hrs === 16 && mins === 59 && secs >= 51)  (hrs === 17 && mins < 30) 
            (hrs === 18 && mins === 59 && secs >= 51)  (hrs === 19 && mins < 30) 
            (hrs === 20 && mins === 59 && secs >= 51) || (hrs === 21 && mins < 30);
            if (!currentRandom || (currentSecs - currentRandom.timestamp >= 6)) {
                const sNum = (Math.random() * (1999.99 - 1000.00) + 1000.00).toFixed(2);
                const vNum = (Math.random() * (59999.99 - 10000.00) + 10000.00).toFixed(2);

                const setDigit = sNum.slice(-1);
                const valDigit = vNum.split('.')[0].slice(-1);

                currentRandom = {
                    res: setDigit + valDigit,
                    set: sNum,
                    val: vNum,
                    timestamp: currentSecs
                };

                localStorage.setItem('macau_live_v2', JSON.stringify(currentRandom));
            }
        }
        if (currentRandom) {
            const mainNum = document.getElementById("main-num");
            const res1100 = document.getElementById("res-1100");
            const set1100 = document.getElementById("set-1100");
            const val1100 = document.getElementById("val-1100");

            if (mainNum) mainNum.innerText = currentRandom.res;
            if (res1100) res1100.innerText = currentRandom.res;
            if (set1100) set1100.innerText = currentRandom.set;
            if (val1100) val1100.innerText = currentRandom.val;
        }
    }

    function createFalling() {
        const coin = document.createElement('div');
        coin.className = 'coin';
        coin.innerHTML = "💰"; 
        coin.style.left = Math.random() * 100 + 'vw';
        coin.style.fontSize = (Math.random() * 25 + 15) + 'px';
        coin.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.body.appendChild(coin);
        setTimeout(() => coin.remove(), 5000);
    }

    setInterval(runEngine, 1000);
    setInterval(createFalling, 400);
    runEngine();
</script>
</body>
</html>
