<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macau 2D Live</title>
    <style>
        /* ဒီအပိုင်းက ဒီဇိုင်းအတွက်ပါ */
        body { background-color: #0d0d0d; color: #f1c40f; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .header { width: 100%; text-align: center; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; margin-bottom: 20px; }
        .main-result { border: 6px solid #f1c40f; border-radius: 50%; width: 160px; height: 160px; display: flex; justify-content: center; align-items: center; font-size: 70px; font-weight: bold; margin: 20px 0; box-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 15px; text-align: center; }
        .card.active { border-color: #f1c40f; background: #2c2201; }
        .time { color: #f1c40f; font-size: 14px; font-weight: bold; }
        .num { font-size: 36px; font-weight: bold; margin: 5px 0; color: #fff; }
        .info { display: flex; justify-content: space-between; font-size: 10px; color: #888; border-top: 1px solid #333; padding-top: 8px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>MACAU 2D LIVE</h1>
    </div>

    <div class="main-result" id="big-num">--</div>
    <p id="status" style="color: #666;">Live Updating...</p>

    <div class="grid">
        <div class="card"><div class="time">08:30 AM</div><div class="num">77</div><div class="info"><span>SET: 1068.17</span><span>VAL: 16985.34</span></div></div>
        <div class="card"><div class="time">10:30 AM</div><div class="num">56</div><div class="info"><span>SET: 1201.34</span><span>VAL: 49791.01</span></div></div>
        <div class="card"><div class="time">12:30 PM</div><div class="num">04</div><div class="info"><span>SET: 1160.40</span><span>VAL: 11683.47</span></div></div>
        <div class="card active"><div class="time">04:30 PM</div><div class="num" id="live-num">--</div><div class="info"><span>SET: 1089.22</span><span>VAL: 74581.65</span></div></div>
    </div>

    <script>
        /* ဒီအပိုင်းက ဂဏန်းပြောင်းဖို့ပါ */
        function updateResult() {
            let n = Math.floor(Math.random() * 100).toString().padStart(2, '0');
            document.getElementById('big-num').innerText = n;
            document.getElementById('live-num').innerText = n;
        }
        setInterval(updateResult, 3000); // ၃ စက္ကန့်တစ်ခါ ပြောင်းမယ်
        updateResult();
    </script>
</body>
</html>
