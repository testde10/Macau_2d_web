<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macau 2D Live - Premium</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-red: #4a0404;
            --card-bg: rgba(20, 20, 20, 0.95);
        }
        body { 
            background: radial-gradient(circle, #222, #000); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 20px;
            min-height: 100vh;
            /* နောက်ခံမှာ ဖဲချပ်ပုံစံ မှိန်မှိန်လေးထည့်ထားခြင်း */
            background-image: url('https://www.transparenttextures.com/patterns/poker.png');
        }
        .header-img { width: 100%; max-width: 400px; margin-bottom: 10px; }
        
        .main-display {
            position: relative;
            width: 200px; height: 200px;
            border: 4px solid var(--gold);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #444, #111);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            margin: 20px 0;
        }
        .main-display::after {
            content: '';
            position: absolute;
            width: 220px; height: 220px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            opacity: 0.5;
        }
        .big-num { font-size: 90px; font-weight: bold; color: var(--gold); text-shadow: 2px 4px 10px #000; }

        .grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; width: 100%; max-width: 450px; 
        }
        .card { 
            background: var(--card-bg); 
            border: 1px solid #444; 
            border-radius: 8px; 
            padding: 15px; 
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #333;
        }
        .card.active { border: 2px solid var(--gold); }
        .card.active::before { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
        
        .time { color: var(--gold); font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .num { font-size: 40px; font-weight: bold; color: #fff; margin: 5px 0; }
        .details { 
            display: flex; justify-content: space-between; 
            font-size: 11px; color: #888; border-top: 1px solid #333; 
            padding-top: 8px; margin-top: 8px;
        }
        .details span b { color: #ccc; }
    </style>
</head>
<body>

    <h2 style="color: var(--gold); letter-spacing: 2px;">MACAU 2D LIVE</h2>
    <div id="last-update" style="font-size: 12px; color: #888; margin-bottom: 10px;"></div>

    <div class="main-display">
        <div class="big-num" id="live-big">--</div>
    </div>

    <div class="grid">
        <div class="card"><div class="time">08:30 AM</div><div class="num">77</div><div class="details"><span>SET<br><b>1068.17</b></span><span>VALUE<br><b>16985.34</b></span></div></div>
        <div class="card"><div class="time">10:30 AM</div><div class="num">56</div><div class="details"><span>SET<br><b>1201.34</b></span><span>VALUE<br><b>49791.01</b></span></div></div>
        <div class="card"><div class="time">12:30 PM</div><div class="num">04</div><div class="details"><span>SET<br><b>1160.40</b></span><span>VALUE<br><b>11683.47</b></span></div></div>
        <div class="card active"><div class="time">04:30 PM</div><div class="num" id="live-small">--</div><div class="details"><span>SET<br><b>1089.22</b></span><span>VALUE<br><b>74581.65</b></span></div></div>
    </div>
    <script>
        function update() {
            let n = Math.floor(Math.random() * 100).toString().padStart(2, '0');
            document.getElementById('live-big').innerText = n;
            document.getElementById('live-small').innerText = n;
            document.getElementById('last-update').innerText = "Updated: " + new Date().toLocaleString();
        }
        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
