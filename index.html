<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACAU 2D LIVE</title>
    <style>
  body {
    background: radial-gradient(circle, #ff6666 0%, #4b0000 70%, #000000 100%);
    color: #ffffff;
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
}
.app-name {
    font-family: 'Times New Roman', serif;
    font-weight: 900;
    font-size: 45px;
    text-transform: uppercase;
    letter-spacing: 8px;
    display: inline-block;
    position: relative;
    background: linear-gradient(
        to right, 
        #bf953f 0%,   
        #ffffff 20%,  
        #ff0000 40%,  
        #000000 60%,  
        #bf953f 100%
    );
    background-size: 400% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: movieTitleReveal 65s ease-in-out infinite;
}

@keyframes movieTitleReveal {
    0% {
        background-position: 400% center;
        filter: brightness(0.3) blur(3px);
        letter-spacing: 20px;
        opacity: 0;
    }
    4% {
        opacity: 1;
        filter: brightness(1.2) blur(0px);
        letter-spacing: 8px;
    }
    8% {
        background-position: 0% center;
        filter: drop-shadow(0 0 15px #bf953f);
        opacity: 1;
    }
    9%, 100% {
        background-position: 0% center;
        filter: drop-shadow(0 0 10px #bf953f);
        opacity: 1;
        letter-spacing: 8px;
    }
}
@keyframes movieTitleReveal {
    0% {
        background-position: 0% center;
        filter: brightness(0.5) blur(2px);
        letter-spacing: 15px;
        opacity: 0;
    }
    20% {
        opacity: 1;
        filter: brightness(1) blur(0px);
    }
    50% {
        background-position: 150% center;
        /* Flash effect at the middle */
        filter: drop-shadow(0 0 25px #ffffff);
        letter-spacing: 8px;
    }
    80% {
        background-position: 300% center;
        filter: drop-shadow(0 0 15px #ffd700);
    }
    100% {
        background-position: 400% center;
        /* Final Solid Gold Look */
        filter: drop-shadow(0 0 10px #bf953f);
        opacity: 1;
    }
}
@keyframes flowAndGlow {
    0% {
        background-position: 0% center;
    }
    50% {
        background-position: 150% center;
        filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.9));
    }
    100% {
        background-position: 300% center;
        filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.8));
    }
}
@keyframes shine {
    to {
        background-position: 200% center;
    }
}
@keyframes textReveal {
    /* Start: Pure White */
    0% { 
        background-position: 100% 0;
        filter: drop-shadow(0 0 0px rgba(255, 255, 255, 0));
    }
    /* Wipe from Left to Right (White to Black to Gold transition) */
    2% { 
        background-position: 0% 0; 
        filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
    }
    /* Final Bright Shine */
    4% { 
        filter: drop-shadow(0 0 20px rgba(255, 215, 0, 1)) brightness(1.5);
    }
    /* Stay Gold & Glow for the rest of the minute */
    6%, 98% { 
        background-position: 0% 0; 
        filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8));
    }
    /* Reset for next minute */
    100% { 
        background-position: 100% 0; 
    }
}
        #main-display {
            width: 190px; height: 190px; background: radial-gradient(circle, #1a1a1a, #000);
            border: 5px solid #d4af37; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.2); margin: 15px auto;
        }
        .main-number { font-size: 100px; font-weight: bold; color: white; text-shadow: 3px 3px 10px #000; }
        .update-bar {
            background: rgba(0, 0, 0, 0.85); padding: 8px 25px; border-radius: 50px;
            border: 1.5px solid #d4af37; font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 25px;
        }
        #grid-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            padding: 0 20px 40px 20px; width: 100%; max-width: 480px; box-sizing: border-box;
        }
        .card { background: #0d0d0d; border: 1.2px solid #d4af37; border-radius: 14px; overflow: hidden; text-align: center; }
        .time-label { background: linear-gradient(to right, #bf953f, #fcf6ba, #d4af37); color: #000 !important; padding: 10px; font-size: 15px; font-weight: 800; }
        .result-num { font-size: 45px; font-weight: 900; padding: 12px 0; color: #fff; }
        .data-row { display: flex; justify-content: space-around; padding: 10px; font-size: 11px; color: #d4af37; border-top: 1px solid #222; background: #050505; }
        .data-row span { display: flex; flex-direction: column; gap: 3px; font-weight: bold; }
        .data-row small { color: #fff; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
