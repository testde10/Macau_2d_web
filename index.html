<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACAU 2D LIVE</title>
    <style>
        body {
            background: radial-gradient(circle, #4b0000 0%, #000 100%);
            color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
      .coin {
    position: fixed;
    top: -60px;
    z-index: -1;
    pointer-events: none;
    animation: fall linear infinite;
    background: transparent !important;
          display: block; /* လေးထောင့်ကွက်မဖြစ်အောင် */
}

@keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.5; }
    90% { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}
        .app-header { padding: 30px 10px 10px 10px; width: 100%; text-align: center; }
        .app-name {
            font-family: 'Times New Roman', serif; font-weight: 900; font-size: 48px;
            text-transform: uppercase; letter-spacing: 4px;
            background: linear-gradient(to bottom, #ffffff 0%, #fcf6ba 20%, #bf953f 45%, #8a6e2f 70%, #ffffff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 5px rgba(0,0,0,1)); margin: 0;
        }
        #main-display {
            width: 210px; height: 210px; background: radial-gradient(circle, #1a1a1a, #000);
            border: 5px solid #d4af37; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.2); margin: 20px auto 15px auto;
        }
        .main-number { font-size: 110px; font-weight: bold; color: #white; text-shadow: 3px 3px 10px #000; }
        .update-bar {
            background: rgba(0, 0, 0, 0.85); padding: 8px 22px; border-radius: 50px;
            border: 1.5px solid #d4af37; font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 30px;
        }
        #grid-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            padding: 0 20px 30px 20px; width: 100%; max-width: 480px;
        }
        .card { background: #0d0d0d; border: 1.2px solid #d4af37; border-radius: 14px; overflow: hidden; text-align: center; }
        .time-label { background: linear-gradient(to right, #bf953f, #fcf6ba, #d4af37); color: #000 !important; padding: 10px; font-size: 15px; font-weight: 800; }
        .result-num { font-size: 46px; font-weight: 900; padding: 12px 0; color: #fff; }
        .data-row { display: flex; justify-content: space-around; padding: 10px; font-size: 11px; color: #d4af37; border-top: 1px solid #222; background: #050505; }
        .data-row span { display: flex; flex-direction: column; gap: 3px; font-weight: bold; }
        .data-row small { color: #fff; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-header"><div class="app-name">MACAU 2D</div></div>
    <div id="main-display"><div class="main-number" id="main-num">--</div></div>
    <div class="update-bar">Updated: <span id="live-clock">--:--:--</span></div>

    <div id="grid-container">
        <div class="card"><div class="time-label">11:00 AM</div><div class="result-num" id="res-1000">--</div><div class="data-row"><span>SET<small id="set-1000">--</small></span><span>VALUE<small id="val-1000">--</small></span></div></div>
        <div class="card"><div class="time-label">01:00 PM</div><div class="result-num" id="res-1300">--</div><div class="data-row"><span>SET<small id="set-1300">--</small></span><span>VALUE<small id="val-1300">--</small></span></div></div>
        <div class="card"><div class="time-label">03:00 PM</div><div class="result-num" id="res-1500">--</div><div class="data-row"><span>SET<small id="set-1500">--</small></span><span>VALUE<small id="val-1500">--</small></span></div></div>
        <div class="card"><div class="time-label">05:00 PM</div><div class="result-num" id="res-1700">--</div><div class="data-row"><span>SET<small id="set-1700">--</small></span><span>VALUE<small id="val-1700">--</small></span></div></div>
        <div class="card"><div class="time-label">07:00 PM</div><div class="result-num" id="res-1900">--</div><div class="data-row"><span>SET<small id="set-1900">--</small></span><span>VALUE<small id="val-1900">--</small></span></div></div>
        <div class="card"><div class="time-label">09:00 PM</div><div class="result-num" id="res-2100">--</div><div class="data-row"><span>SET<small id="set-2100">--</small></span><span>VALUE<small id="val-2100">--</small></span></div></div>
    </div>

    <script>
        const resultsData = {
            "1000": { res: "51", set: "1234.45", val: "54321.02" },
            "1300": { res: "08", set: "1452.40", val: "34518.50" },
            "1500": { res: "29", set: "1879.92", val: "48789.47" },
            "1700": { res: "83", set: "1733.78", val: "47333.69" },
            "1900": { res: "64", set: "1925.06", val: "40514.91" },
            "2100": { res: "97", set: "2107.39", val: "51007.83" }
        };

        const sessions = [
            { id: "1000", h: 10, m: 0 }, { id: "1300", h: 13, m: 0 },
            { id: "1500", h: 15, m: 0 }, { id: "1700", h: 17, m: 0 },
            { id: "1900", h: 19, m: 0 }, { id: "2100", h: 21, m: 0 }
        ];

        let currentRandom = { res: "--", set: "--", val: "--" };
        let lastChangeTime = 0;

        function runEngine() {
            const now = new Date();
            const mmTime = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Yangon"}));
            const hh = mmTime.getHours();
            const mm = mmTime.getMinutes();
            const ss = mmTime.getSeconds();
            const currentTotalMins = (hh * 60) + mm;
            const currentSecs = (currentTotalMins * 60) + ss;

            document.getElementById("live-clock").innerText = mmTime.toLocaleString('en-US', { hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true });

            let activeIdx = -1;
            for(let i=0; i < sessions.length; i++) {
                const drawMins = (sessions[i].h * 60) + sessions[i].m;
                const prevMins = (i === 0) ? 0 : (sessions[i-1].h * 60);
                const startMins = (i === 0) ? 480 : prevMins + 15;
                if (currentTotalMins >= startMins && currentTotalMins < drawMins) {
                    activeIdx = i; break;
                }
            }

            sessions.forEach((s, idx) => {
                const drawMins = (s.h * 60) + s.m;
                const resElem = document.getElementById("res-" + s.id);
                const setElem = document.getElementById("set-" + s.id);
                const valElem = document.getElementById("val-" + s.id);

                if (currentTotalMins >= drawMins) {
                    resElem.innerText = resultsData[s.id].res;
                    setElem.innerText = resultsData[s.id].set;
                    valElem.innerText = resultsData[s.id].val;
             } else if (idx === activeIdx) {
            const savedData = localStorage.getItem('current2D');
            const savedTime = localStorage.getItem('lastTime');
            let lastChangeTime = savedTime ? parseInt(savedTime) : 0;

            if (currentSecs - lastChangeTime >= 6 || !savedData) {
                const sNum = (Math.random() * (1999.99 - 1000.00) + 1000.00).toFixed(2);
                const vNum = (Math.random() * (59999.99 - 10000.00) + 10000.00).toFixed(2);
                
                currentRandom = {
                    res: sNum.slice(-1) + vNum.split('.')[0].slice(-1),
                    set: sNum, 
                    val: vNum
                };
                
                localStorage.setItem('current2D', JSON.stringify(currentRandom));
                localStorage.setItem('lastTime', currentSecs.toString());
            } else {
                currentRandom = JSON.parse(savedData);
            }

            resElem.innerText = currentRandom.res;
            setElem.innerText = currentRandom.set;
            valElem.innerText = currentRandom.val;
            document.getElementById("main-num").innerText = currentRandom.res;
        } else {   

                if (currentSecs - lastChangeTime >= 6 || !savedData) {
                    const sNum = (Math.random() * (1999.99 - 1000.00) + 1000.00).toFixed(2);
                    const vNum = (Math.random() * (59999.99 - 10000.00) + 10000.00).toFixed(2);
                    
                    currentRandom = {
                        res: sNum.slice(-1) + vNum.split('.')[0].slice(-1),
                        set: sNum, 
                        val: vNum
                    };
                    
                    localStorage.setItem('current2D', JSON.stringify(currentRandom));
                    lastChangeTime = currentSecs;
                } else {
                    currentRandom = JSON.parse(savedData);
                }

                resElem.innerText = currentRandom.res;
                setElem.innerText = currentRandom.set;
                valElem.innerText = currentRandom.val;
                document.getElementById("main-num").innerText = currentRandom.res;
                    resElem.innerText = "--"; setElem.innerText = "--"; valElem.innerText = "--";
                }
            });

            if (activeIdx === -1) {
                let lastId = "2100";
                for(let i = sessions.length - 1; i >= 0; i--) {
                    if (currentTotalMins >= (sessions[i].h * 60)) { lastId = sessions[i].id; break; }
                }
                if (currentTotalMins >= 1260 || currentTotalMins < 480) lastId = "2100";
                document.getElementById("main-num").innerText = resultsData[lastId].res;
            }
        }

        setInterval(runEngine, 1000);
        runEngine();
        function createFallingElements() {
        const coinImages = [
            'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><circle cx="256" cy="256" r="240" fill="%23d4af37" stroke="white" stroke-width="20"/><text x="50%" y="55%" font-family="Arial" font-size="100" fill="white" text-anchor="middle" font-weight="bold">105</text></svg>',
            'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><circle cx="256" cy="256" r="240" fill="%23b00000" stroke="white" stroke-width="20"/><text x="50%" y="55%" font-family="Arial" font-size="100" fill="white" text-anchor="middle" font-weight="bold">105</text></svg>',
            'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><circle cx="256" cy="256" r="240" fill="white" stroke="%23ccc" stroke-width="20"/><text x="50%" y="55%" font-family="Arial" font-size="100" fill="%23666" text-anchor="middle" font-weight="bold">105</text></svg>',
            'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><circle cx="256" cy="256" r="240" fill="black" stroke="white" stroke-width="20"/><text x="50%" y="55%" font-family="Arial" font-size="100" fill="white" text-anchor="middle" font-weight="bold">105</text></svg>',
            'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><circle cx="256" cy="256" r="240" fill="%2328a745" stroke="white" stroke-width="20"/><text x="50%" y="55%" font-family="Arial" font-size="100" fill="white" text-anchor="middle" font-weight="bold">105</text></svg>'
        ];
        const diceImages = [
            'https://cdn-icons-png.flaticon.com/512/7510/7510632.png',
            'https://cdn-icons-png.flaticon.com/512/7510/7510634.png',
            'https://cdn-icons-png.flaticon.com/512/7510/7510637.png'
        ];
        const allItems = [...coinImages, ...diceImages];
        setInterval(() => {
            const el = document.createElement('img');
            el.src = allItems[Math.floor(Math.random() * allItems.length)];
            el.className = 'coin';
            el.style.left = Math.random() * 100 + "vw";
            const sizes = ['15px', '25px', '35px'];
            el.style.width = sizes[Math.floor(Math.random() * sizes.length)];
            el.style.animationDuration = (Math.random() * 4 + 6) + "s"; 
            el.style.opacity = Math.random() * 0.15 + 0.1;
            document.body.appendChild(el);
            setTimeout(() => { el.remove(); }, 10000);
        }, 1100);
    }
    createFallingElements();
            coin.src = coinImages[Math.floor(Math.random() * coinImages.length)];
            coin.className = 'coin';
            
            // ၃။ နေရာကို Random ချခြင်း
            coin.style.left = Math.random() * 100 + "vw";
            
            // ၄။ အရွယ်အစားကို Random ရွေးချယ်ခြင်း (အကြီး၊ အလတ်၊ အသေး)
            const randomSize = sizes[Math.floor(Math.random() * sizes.length)];
            coin.style.width = randomSize;

            // ၅။ အမြန်နှုန်းကို Random လုပ်ခြင်း
            coin.style.animationDuration = (Math.random() * 5 + 5) + "s"; 
            
            // ၆။ ကြည့်ရမရှုပ်အောင် အရောင်ကို အတော်လေးဖျော့ထားခြင်း (0.1 မှ 0.3 ကြား)
            coin.style.opacity = Math.random() * 0.2 + 0.1;

            document.body.appendChild(coin);
            setTimeout(() => { coin.remove(); }, 10000);
        }, 1200); // ကျလာမယ့်နှုန်း
    }
    createCoins();
    </script>
</body>
</html>
