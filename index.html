<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macau 2D Live</title>
    <style>
        body { 
            background: radial-gradient(circle at top, #800000 0%, #2b0000 50%, #000000 100%); 
            color: #e4c666; font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 15px; min-height: 100vh;
        }
        .main-ring {
            width: 160px; height: 160px;
            border: 4px solid #e4c666; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #222, #000);
            box-shadow: 0 0 25px rgba(228, 198, 102, 0.4);
            font-size: 80px; font-weight: 900; color: #fff;
            margin: 20px auto;
        }
        .grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 12px; width: 100%; max-width: 480px; 
        }
        .card { 
            background: rgba(20, 20, 20, 0.95); 
            border: 1px solid #3d3d3d; border-radius: 8px; 
            padding: 15px; text-align: center; position: relative;
            border-top: 3px solid #e4c666;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .card::after, .card::before {
            content: ''; position: absolute; bottom: 5px; width: 10px; height: 10px;
            border-bottom: 2px solid #e4c666;
        }
        .card::after { right: 5px; border-right: 2px solid #e4c666; }
        .card::before { left: 5px; border-left: 2px solid #e4c666; }
        .time { color: #e4c666; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        .num { font-size: 40px; font-weight: bold; color: #fff; margin: 5px 0; }
        .details { display: flex; justify-content: space-between; font-size: 9px; color: #888; border-top: 1px solid #222; padding-top: 6px; }
        b { color: #fff; }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 3px; margin-bottom: 5px;">MACAU 2D LIVE</h2>
    <div class="main-ring" id="big-num">--</div>
    <p style="font-size: 11px; color: #aaa;">Updated: <span id="clock">Loading...</span></p>

    <div class="grid">
        <div class="card">
            <div class="time">11:00 AM</div>
            <div class="num" id="num-0">--</div>
            <div class="details"><span>SET: <b id="set-0">----.--</b></span><span>VAL: <b id="val-0">-----.--</b></span></div>
        </div>
        <div class="card">
            <div class="time">01:00 PM</div>
            <div class="num" id="num-1">--</div>
            <div class="details"><span>SET: <b id="set-1">----.--</b></span><span>VAL: <b id="val-1">-----.--</b></span></div>
        </div>
        <div class="card">
            <div class="time">03:00 PM</div>
            <div class="num" id="num-2">--</div>
            <div class="details"><span>SET: <b id="set-2">----.--</b></span><span>VAL: <b id="val-2">-----.--</b></span></div>
        </div>
        <div class="card" style="border: 2px solid #fff;">
            <div class="time">05:00 PM</div>
            <div class="num" id="num-3">--</div>
            <div class="details"><span>SET: <b id="set-3">----.--</b></span><span>VAL: <b id="val-3">-----.--</b></span></div>
        </div>
        <div class="card">
            <div class="time">07:00 PM</div>
            <div class="num" id="num-4">--</div>
            <div class="details"><span>SET: <b id="set-4">----.--</b></span><span>VAL: <b id="val-4">-----.--</b></span></div>
        </div>
        <div class="card">
            <div class="time">09:00 PM</div>
            <div class="num" id="num-5">--</div>
            <div class="details"><span>SET: <b id="set-5">----.--</b></span><span>VAL: <b id="val-5">-----.--</b></span></div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString();
        }
        function updateAllNumbers() {
            try {
                for (let i = 0; i < 6; i++) {
                    let randomSet = (Math.random() * 2000 + 1000).toFixed(2);
                    let randomValue = (Math.random() * 80000 + 10000).toFixed(2);

                    let firstNum = randomSet.split('.')[0].slice(-1);
                    let lastNum = randomValue.split('.')[0].slice(-1);
                    let result2D = firstNum + lastNum;

                    document.getElementById(num-${i}).innerText = result2D;
                    document.getElementById(set-${i}).innerText = randomSet;
                    document.getElementById(val-${i}).innerText = randomValue;

                    if (i === 3) { // 05:00 PM အကွက်ကို အပေါ်ဝိုင်းမှာပြရန်
                        document.getElementById('big-num').innerText = result2D;
                    }
                }
            } catch (e) {
                console.error("Error updating numbers:", e);
            }
        }

        setInterval(updateClock, 1000); // နာရီက ၁ စက္ကန့်တစ်ခါ
        setInterval(updateAllNumbers, 7000); // ဂဏန်းတွေက ၇ စက္ကန့်တစ်ခါ
        
        updateClock();
        updateAllNumbers();
    </script>
</body>
</html>
