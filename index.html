<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACAU 2D LIVE</title>
    <style>
        /* CSS Settings */
        body {
            background: radial-gradient(circle, #4b0000 0%, #000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-header {
            padding: 30px 10px 10px 10px;
            width: 100%;
            text-align: center;
        }

        /* Gold & White Metallic Title */
        .app-name {
            font-family: 'Times New Roman', serif;
            font-weight: 900;
            font-size: 45px;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(
                to bottom, 
                #ffffff 0%,    
                #fcf6ba 25%,   
                #bf953f 50%,   
                #8a6e2f 75%,   
                #bf953f 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.9));
            margin: 0;
            display: inline-block;
        }

        /* Main Display Circle */
        #main-display {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #222, #000);
            border: 6px solid #d4af37;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.5);
            margin: 25px auto;
        }

        .main-number {
            font-size: 100px;
            font-weight: bold;
            color: #d4af37;
            text-shadow: 2px 2px 15px #000;
        }

        /* Clock Bar */
        .update-bar {
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1.5px solid #d4af37;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* 6 Cards Grid */
        #grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: #111;
            border: 1.5px solid #d4af37;
            border-radius: 15px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        /* Gold Header for all cards */
        .time-label {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
            color: #000 !important;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
        }


        
        .result-num {
            font-size: 45px;
            font-weight: bold;
            padding: 15px 0;
            color: #ffffff;
        }

        .data-row {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            font-size: 12px;
            color: #d4af37;
            border-top: 1px solid #222;
            background: #0a0a0a;
        }

        .data-row span {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .data-row small {
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-name">MACAU 2D</div>
    </div>

    <div id="main-display">
        <div class="main-number" id="main-num">--</div>
    </div>

    <div class="update-bar">
        Updated: <span id="live-clock">00:00:00 AM</span>
    </div>
    <div id="grid-container">
        <div class="card" id="card-1000">
            <div class="time-label">10:00 AM</div>
            <div class="result-num" id="res-1000">--</div>
            <div class="data-row">
                <span>SET<small id="set-1000">--</small></span>
                <span>VALUE<small id="val-1000">--</small></span>
            </div>
        </div>
        <div class="card" id="card-1300">
            <div class="time-label">01:00 PM</div>
            <div class="result-num" id="res-1300">--</div>
            <div class="data-row">
                <span>SET<small id="set-1300">--</small></span>
                <span>VALUE<small id="val-1300">--</small></span>
            </div>
        </div>
        <div class="card" id="card-1500">
            <div class="time-label">03:00 PM</div>
            <div class="result-num" id="res-1500">--</div>
            <div class="data-row">
                <span>SET<small id="set-1500">--</small></span>
                <span>VALUE<small id="val-1500">--</small></span>
            </div>
        </div>
        <div class="card" id="card-1700">
            <div class="time-label">05:00 PM</div>
            <div class="result-num" id="res-1700">--</div>
            <div class="data-row">
                <span>SET<small id="set-1700">--</small></span>
                <span>VALUE<small id="val-1700">--</small></span>
            </div>
        </div>
        <div class="card" id="card-1900">
            <div class="time-label">07:00 PM</div>
            <div class="result-num" id="res-1900">--</div>
            <div class="data-row">
                <span>SET<small id="set-1900">--</small></span>
                <span>VALUE<small id="val-1900">--</small></span>
            </div>
        </div>
        <div class="card" id="card-2100">
            <div class="time-label">09:00 PM</div>
            <div class="result-num" id="res-2100">--</div>
            <div class="data-row">
                <span>SET<small id="set-2100">--</small></span>
                <span>VALUE<small id="val-2100">--</small></span>
            </div>
        </div>
    </div>

    <script>
        // --- CONTROL PANEL (Edit results here) ---
        const resultsData = {
            "1000": { res: "--", set: "--", val: "--" },
            "1300": { res: "--", set: "--", val: "--" },
            "1500": { res: "--", set: "--", val: "--" },
            "1700": { res: "--", set: "--", val: "--" },
            "1900": { res: "16", set: "1925.16", val: "40516.88" },
            "2100": { res: "--", set: "--", val: "--" }
        };

        function updateDisplay() {
            const now = new Date();
            const mmTime = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Yangon"}));
            document.getElementById("live-clock").innerText = mmTime.toLocaleString('en-US', { 
                hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true 
            });

            Object.keys(resultsData).forEach(id => {
                const data = resultsData[id];
                document.getElementById("res-" + id).innerText = data.res;
                document.getElementById("set-" + id).innerText = data.set;
                document.getElementById("val-" + id).innerText = data.val;
                
                // Example: Show 7:00 PM result in main circle
                if(id === "1900" && data.res !== "--") {
                    document.getElementById("main-num").innerText = data.res;
                }
            });
        }
        updateDisplay();
        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>
