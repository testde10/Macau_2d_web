<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACAU 2D LIVE</title>
    <style>
  body {
    background: radial-gradient(circle, #ff6666 0%, #4b0000 70%, #000000 100%);
    color: #ffffff;
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
}
      .app-name {
    font-family: 'Times New Roman', serif;
    font-weight: 900;
    font-size: 45px;
    text-transform: uppercase;
    letter-spacing: 8px;
    display: inline-block;
    position: relative;
    background: linear-gradient(
        to right, 
        #bf953f 0%,   
        #ffffff 20%,  
        #ff0000 40%,  
        #000000 60%,  
        #bf953f 100%
    );
    background-size: 400% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    /* Duration: 40s (10s Animation + 30s Pause) */
    animation: movieTitleReveal 40s ease-in-out infinite;
}

@keyframes movieTitleReveal {
    0% {
        background-position: 400% center;
        filter: brightness(0.3) blur(3px);
        letter-spacing: 20px;
        opacity: 0;
    }
    10% {
        opacity: 1;
        filter: brightness(1.2) blur(0px);
        letter-spacing: 8px;
    }
    25% {
        background-position: 0% center;
        filter: drop-shadow(0 0 15px #bf953f);
        opacity: 1;
    }
    /* Stay still from 26% to 100% (approx 30 seconds) */
    26%, 100% {
        background-position: 0% center;
        filter: drop-shadow(0 0 10px #bf953f);
        opacity: 1;
        letter-spacing: 8px;
    }
}
     #main-display {
    width: 220px; 
    height: 220px;
    background: radial-gradient(circle, #1a1a1a, #000);
    border: 5px solid #d4af37;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 35px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.2);
    margin: 20px auto;
}

.main-number { 
    font-size: 110px; 
    font-weight: bold; 
    color: white; 
    text-shadow: 3px 3px 10px #000; 
}

.update-bar {
    background: rgba(0, 0, 0, 0.85); 
    padding: 10px 30px; 
    border-radius: 50px;
    border: 1.5px solid #d4af37; 
    font-size: 16px; 
    font-weight: bold; 
    color: #fff; 
    margin-bottom: 30px;
}

#grid-container {
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 20px;
    padding: 0 20px 40px 20px; 
    width: 100%; 
    max-width: 550px; 
    box-sizing: border-box;
    margin: 0 auto;
}

.card { 
    background: #0d0d0d; 
    border: 1.5px solid #d4af37; 
    border-radius: 18px; 
    overflow: hidden; 
}

.time-label { 
    background: linear-gradient(to right, #bf953f, #fcf6ba, #d4af37); 
    color: #000 !important; 
    font-weight: bold; 
    padding: 8px 0;
    font-size: 16px;
}

.result-num { 
    font-size: 55px; 
    font-weight: 900; 
    padding: 15px 0; 
    color: #fff; 
}

.data-row { 
    display: flex; 
    justify-content: space-around; 
    padding: 12px; 
    font-size: 14px; 
    color: #ccc;
}

.data-row span { 
    display: flex; 
    flex-direction: column; 
    gap: 5px; 
    font-weight: bold; 
}

.data-row small { 
    color: #fff; 
    font-size: 15px; 
    font-weight: bold; 
}
    </style>
</head>
<body>

    <div class="app-header"><div class="app-name">MACAU 2D</div></div>
    <div id="main-display"><div class="main-number" id="main-num">--</div></div>
    <div class="update-bar">Updated: <span id="live-clock">--:--:--</span></div>

    <div id="grid-container">
        <div class="card">
            <div class="time-label">11:00 AM</div>
            <div class="result-num" id="res-1100">--</div>
            <div class="data-row">
                <span>SET<small id="set-1100">--</small></span>
                <span>VALUE<small id="val-1100">--</small></span>
            </div>
        </div>
        <div class="card">
            <div class="time-label">01:00 PM</div>
            <div class="result-num" id="res-1300">--</div>
            <div class="data-row">
                <span>SET<small id="set-1300">--</small></span>
                <span>VALUE<small id="val-1300">--</small></span>
            </div>
        </div>
        <div class="card">
            <div class="time-label">03:00 PM</div>
            <div class="result-num" id="res-1500">--</div>
            <div class="data-row">
                <span>SET<small id="set-1500">--</small></span>
                <span>VALUE<small id="val-1500">--</small></span>
            </div>
        </div>
        <div class="card">
            <div class="time-label">05:00 PM</div>
            <div class="result-num" id="res-1700">--</div>
            <div class="data-row">
                <span>SET<small id="set-1700">--</small></span>
                <span>VALUE<small id="val-1700">--</small></span>
            </div>
        </div>
        <div class="card">
            <div class="time-label">07:00 PM</div>
            <div class="result-num" id="res-1900">--</div>
            <div class="data-row">
                <span>SET<small id="set-1900">--</small></span>
                <span>VALUE<small id="val-1900">--</small></span>
            </div>
        </div>
        <div class="card">
            <div class="time-label">09:00 PM</div>
            <div class="result-num" id="res-2100">--</div>
            <div class="data-row">
                <span>SET<small id="set-2100">--</small></span>
                <span>VALUE<small id="val-2100">--</small></span>
            </div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
